name: Hourly notifications

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  ping-notifications:
    runs-on: ubuntu-latest

    steps:
      - name: Call notifications endpoint
        run: |
          curl -X POST "${{ secrets.NOTIFICATIONS_URL }}" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          -H "Content-Type: application/json"
