<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Atlyo</title>
  <!-- Minimal Apple-like typography: prefer system fonts (SF Pro on Apple devices) -->
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: #050607;
      color: #f5f7fa;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #080a0d; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.10); border-radius: 6px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(57,224,122,0.35); }
    ::selection { background: rgba(57,224,122,0.18); color: #39e07a; }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { opacity: 0.4; }
    select option { background: rgba(18, 22, 28, 0.95); color: #f5f7fa; }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
